<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register|Music player</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(24, 24, 27);
            margin: 0;
        }
        .register-card{
            background-color: rgb(34, 35, 38);
            padding: 3rem;
            border-radius: 2rem;
            border: 1px solid rgb(49, 48, 53);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .register-header i {
            font-size: 3rem;
            color: rgb(85, 214, 121);
            margin-bottom: 1rem;
        }
        .register-header h2 {
            color: rgb(255, 255, 255);
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
        }
        .register-header p {
            color: rgb(180, 188, 208);
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 0.5rem;
            margin-bottom: 2.5rem;
        }
        .input-group{
            position: relative;
            margin-bottom: 1.25rem;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgb(180, 188, 208);
            opacity: 0.5;
        }
        .input-group input{
            width: 100%;
            background: rgb(24, 24, 27);
            border: 1px solid rgb(49, 48, 53);
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease; 
        }
        .input-group input:focus{
            outline: none;
            border-color: rgb(85, 214, 121);
            box-shadow: 0 0 0 4px rgba(85, 214, 121, 0.1);
        }
        .register-btn{
            width: 100%;
            background-color: rgb(85, 214, 121);
            color: rgb(24, 24, 27);
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            margin-top: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s filter 0.2s;
        }
        .register-btn:hover{
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .register-footer{
            margin-top: 2rem;
            font-size: 0.9rem;
        }
        .register-footer a{
            color: rgb(85, 214, 121);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }
        .register-footer a:hover{
            text-decoration: underline;
        }
        .admin-key-toggle{
            display: flex;
            justify-content: flex-start;
            margin-bottom: 1rem;
        }
        .toggle-label{
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: rgb(180, 188, 208);
            cursor: pointer;
            user-select: none;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .toggle-label:hover{
            opacity: 1;
            color: rgb(85, 214, 121);
        }
        .admin-key-wrapper{
            max-height: 0;
            max-width: 0;
            visibility: hidden;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.3s ease,
                        visibility 0.3s;
            margin-bottom: 0;
        }
        .admin-key-wrapper.is-visible{
            max-height: 80px;
            max-width: 100%;
            opacity: 1;
            visibility: visible;
            margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-header">
            <i class="ph ph-music-note-simple"></i>
            <h2>Create an account</h2>
            <p></p>
        </div>
        <form id="registerForm" autocomplete="off">
            <div class="input-group">
                <i class="ph ph-user"></i>
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="ph ph-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                <i class="ph ph-lock-key"></i>
                <input type="password" id="passwordConfirmed" placeholder="Repeat your password" required>
            </div>
            <div id="passwordError" style="color: rgb(255, 77, 77); visibility: hidden; margin-bottom: 1rem; font-size: 0.9rem;"></div>
            <div class="admin-key-toggle">
                <label class="toggle-label">
                    <input type="checkbox" id="toggleAdminKey">
                    <i class="ph ph-shield-check"></i>
                    <span>Sign up as Administrator</span>
                </label>
            </div>
            <div class="admin-key-wrapper" id="adminKeyWrapper">
                <div class="input-group">
                    <i class="ph ph-key"></i>
                    <input type="password" id="admin-key" placeholder="Admin secret key" autocomplete="new-password">
                </div>
            </div>
            <button type="submit" class="register-btn">
                <span>Register</span>
                <i class="ph ph-arrow-right"></i>
            </button>
        </form>
        <div class="register-footer">
            <div class="link">
                <a href="/login.html">Log in</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const passwordAgain = document.getElementById('passwordConfirmed').value;
            const errorDiv = document.getElementById('passwordError');
            const adminKey = document.getElementById('admin-key').value;
            e.preventDefault();
            

            if(passwordAgain !== password){
                errorDiv.innerText = "Passwords must match!";
                errorDiv.style.visibility = 'visible';
                document.getElementById('passwordConfirmed').style.borderColor = 'rgb(255, 77, 77)';
                document.getElementById('passwordConfirmed').focus();
                return;
            }
            errorDiv.style.visibility = 'hidden';
            document.getElementById('passwordConfirmed').style.borderColor = '';

            try{
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, adminKey})
                });

                const data = await response.json();

                if(response.ok){
                    alert("Success!" + data.message);
                    window.location.href = '/login.html';
                }else{
                    alert("Error: " + data.message);
                }
            }catch(error){
                console.error("Error in registration: " + error);
                alert("Server disconnected!");
            }
        });

        document.getElementById('toggleAdminKey').addEventListener('change', function(){
            const wrapper = document.getElementById('adminKeyWrapper');
            const inputField = document.getElementById('admin-key');
            
            if(this.checked){
                wrapper.classList.add('is-visible');
                setTimeout(() => inputField.focus(), 200);
            }else{
                wrapper.classList.remove('is-visible');
                inputField.value = '';
            }
        });

        document.getElementById('passwordConfirmed').addEventListener('input', function(){
            const password = document.getElementById('password').value;
            const passwordAgain = document.getElementById('passwordConfirmed').value;
            if(passwordAgain.length > 0){
                if(passwordAgain !== password){
                    this.style.borderColor = "rgb(255, 77, 77)";
                }else{
                    this.style.borderColor = "";
                }
            }else{
                this.style.borderColor = "";
            }
        });
    </script>
</body>
</html>
