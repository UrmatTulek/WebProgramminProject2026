<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud player|Music player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header class="header">
        <div class="user-profile">
            <h1 id="app-logo">Cloud Player</h1>
            <h1 id="welcome">Welcome, Guest</h1>
        </div>
        <div class="header-controls">
            <button id="goAdminBtn" class="header-btn" style="visibility: hidden;">Go admin</button>
            <label class="theme-toggle">
                <input type="checkbox" id="themeCheckbox" />
                <i class="ph ph-sun"></i>
                <span>Theme</span>
            </label>
    
            <button id="logoutBtn" class="header-btn">Log out</button>
        </div>
    </header>

    <main class="main-content">
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Type to search">
        </div>

        <section class="library-section">
            <h2>Your library</h2>
            <div id="songsList" class="song-grid"></div>
            <h2>Radio stations</h2>
            <div id="radio-container"></div>
        </section>
    </main>

    <div class="player-bar">
        <div class="timeline-container">
            <span id="currentTime" class="time-stamp">0:00</span>
            <input type="range" id="trackTimeline" min="0" max="100" value="0" step="0.1">
            <span id="trackDuration" class="time-stamp">0:00</span>
        </div>
        <div class="current-info">
            <div class="album-art">
                <i class="ph ph-music-note"></i><img id="current-album-img" src="" style="display:none">
            </div>
            <div class="track-text">
                <span id="current-track-title">Not Playing</span>
                <span id="current-track-artist">Select a song</span>
            </div>
        </div>
        <div class="player-control">
            <div class="button-row">
                <button class="button" id="shuffleBtn"><i class="ph ph-shuffle"></i></button>
                <button class="button" id="skipBack"><i class="ph ph-skip-back"></i></button>
                <button class="button button--play" id="masterPlayBtn">
                    <i class="ph ph-play"></i>
                    <i class="ph ph-pause"></i>
                </button>
                <button class="button" id="skipForward"><i class="ph ph-skip-forward"></i></button>
                <button class="button" id="repeatBtn"><i class="ph ph-repeat"></i></button>
            </div>
        </div>


        <div class="volume-box">
             <i class="ph ph-speaker-high"></i>
             <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.8">
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script src="script.js"></script>
</body>
</html>
